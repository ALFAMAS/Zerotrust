# Local/staging Alertmanager routing — alerts appear in the UI at :9093.
# For production PagerDuty/Slack receivers, copy
# monitoring/alertmanager.production.example.yml to alertmanager.production.yml
# (gitignored) and mount it instead — see docs/deployment.md § OBS-1.

global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: ["alertname", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: page
      receiver: default
      continue: false
    - match:
        severity: warning
      receiver: default

receivers:
  - name: default
    # Local/staging: no outbound receiver — review fired alerts in the Alertmanager UI.

inhibit_rules:
  - source_match:
      severity: page
    target_match:
      severity: warning
    equal: ["alertname", "service"]
