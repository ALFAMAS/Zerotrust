global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alerts.yml

# Local dev (open /metrics): use this file as-is.
# Production / staging: uncomment `authorization` below, create
# `monitoring/metrics-token` from `metrics-token.example` (same value as
# `METRICS_AUTH_TOKEN` on the API), and mount it in compose — see
# `docs/deployment.md` § Metrics auth verification (OPS-1).
scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: zerotrust-api
    metrics_path: /metrics
    # authorization:
    #   type: Bearer
    #   credentials_file: /etc/prometheus/metrics-token
    static_configs:
      - targets:
          - zerotrust:3000
