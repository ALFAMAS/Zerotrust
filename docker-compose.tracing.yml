# Distributed tracing viewer — Jaeger all-in-one with OTLP ingestion.
# The API is already instrumented with OpenTelemetry; this gives you the UI.
#
#   docker compose -f docker-compose.tracing.yml up -d
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318 bun dev
#
#   Jaeger UI:  http://localhost:16686

services:
  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: zerotrust-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # Jaeger UI
      - "4318:4318" # OTLP HTTP (the API exports here)
      - "4317:4317" # OTLP gRPC
    restart: unless-stopped
