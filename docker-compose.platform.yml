# Optional platform services for local/staging operations.
#
# Usage (merge with the core stack so services share the `zerotrust` network):
#   docker compose -f docker-compose.yml -f docker-compose.platform.yml up -d
#
# Start individual groups:
#   docker compose -f docker-compose.yml -f docker-compose.platform.yml up -d opensearch opensearch-dashboards
#   docker compose -f docker-compose.yml -f docker-compose.platform.yml up -d uptime-kuma
#   docker compose -f docker-compose.yml -f docker-compose.platform.yml up -d glitchtip-web glitchtip-worker
#   docker compose -f docker-compose.yml -f docker-compose.platform.yml up -d vault
#   docker compose -f docker-compose.yml -f docker-compose.platform.yml up -d nocodb
#
# PostHog is started separately via the official hobby deploy script — see
# `scripts/ops/posthog-hobby.sh` and `docs/infra/README.md` § PostHog.
#
# Production hardening: merge `docker-compose.platform.prod.example.yml` after this
# file (OpenSearch security plugin, GlitchTip registration lockdown).
#
# Ports (host):
#   OpenSearch API          http://localhost:9201
#   OpenSearch Dashboards   http://localhost:5602
#   Uptime Kuma             http://localhost:3002
#   GlitchTip               http://localhost:8100
#   HashiCorp Vault         http://localhost:8200
#   NocoDB                  http://localhost:8080

services:
  # ─────────────────────────────────────────────────────────────────────────
  # OpenSearch: Elasticsearch-compatible search / audit mirror (opt-in)
  # Wire zerotrust with ELASTICSEARCH_ENABLED=true and ELASTICSEARCH_HOST=localhost
  # ELASTICSEARCH_PORT=9201 (OpenSearch uses the ES-compatible REST API).
  # ─────────────────────────────────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.15.0
    container_name: zerotrust-opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9201:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - zerotrust
    restart: unless-stopped

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.15.0
    container_name: zerotrust-opensearch-dashboards
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5602:5601"
    depends_on:
      opensearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5601/api/status >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - zerotrust
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # Uptime Kuma: synthetic uptime checks + status pages
  # ─────────────────────────────────────────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: zerotrust-uptime-kuma
    ports:
      - "3002:3001"
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - zerotrust
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # GlitchTip: self-hosted Sentry-compatible error tracking
  # Set SENTRY_DSN to the project DSN shown in the GlitchTip UI.
  # ─────────────────────────────────────────────────────────────────────────
  glitchtip-postgres:
    image: postgres:16-alpine
    container_name: zerotrust-glitchtip-postgres
    environment:
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: ${GLITCHTIP_POSTGRES_PASSWORD:-glitchtip}
      POSTGRES_DB: glitchtip
    volumes:
      - glitchtip_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glitchtip -d glitchtip"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zerotrust
    restart: unless-stopped

  glitchtip-redis:
    image: redis:7-alpine
    container_name: zerotrust-glitchtip-redis
    command: redis-server --appendonly yes
    volumes:
      - glitchtip_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zerotrust
    restart: unless-stopped

  glitchtip-migrate:
    image: glitchtip/glitchtip:6
    container_name: zerotrust-glitchtip-migrate
    command: ./bin/run-migrate.sh
    environment:
      DATABASE_URL: postgres://glitchtip:${GLITCHTIP_POSTGRES_PASSWORD:-glitchtip}@glitchtip-postgres:5432/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-generate-with-openssl-rand-hex-32}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8100}
      DEFAULT_FROM_EMAIL: ${GLITCHTIP_DEFAULT_FROM_EMAIL:-noreply@zerotrust.local}
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      REDIS_URL: redis://glitchtip-redis:6379/0
    depends_on:
      glitchtip-postgres:
        condition: service_healthy
      glitchtip-redis:
        condition: service_healthy
    networks:
      - zerotrust
    restart: "no"

  glitchtip-web:
    image: glitchtip/glitchtip:6
    container_name: zerotrust-glitchtip-web
    command: ./bin/run-web.sh
    ports:
      - "8100:8000"
    environment:
      DATABASE_URL: postgres://glitchtip:${GLITCHTIP_POSTGRES_PASSWORD:-glitchtip}@glitchtip-postgres:5432/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-generate-with-openssl-rand-hex-32}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8100}
      DEFAULT_FROM_EMAIL: ${GLITCHTIP_DEFAULT_FROM_EMAIL:-noreply@zerotrust.local}
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      REDIS_URL: redis://glitchtip-redis:6379/0
      ENABLE_USER_REGISTRATION: ${GLITCHTIP_ENABLE_USER_REGISTRATION:-true}
      ENABLE_ORGANIZATION_CREATION: ${GLITCHTIP_ENABLE_ORGANIZATION_CREATION:-true}
      # Production: set both to false via docker-compose.platform.prod.example.yml
    volumes:
      - glitchtip_uploads:/code/uploads
    depends_on:
      glitchtip-migrate:
        condition: service_completed_successfully
      glitchtip-postgres:
        condition: service_healthy
      glitchtip-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000 >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - zerotrust
    restart: unless-stopped

  glitchtip-worker:
    image: glitchtip/glitchtip:6
    container_name: zerotrust-glitchtip-worker
    command: ./bin/run-worker.sh
    environment:
      DATABASE_URL: postgres://glitchtip:${GLITCHTIP_POSTGRES_PASSWORD:-glitchtip}@glitchtip-postgres:5432/glitchtip
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:-change-me-generate-with-openssl-rand-hex-32}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:-http://localhost:8100}
      DEFAULT_FROM_EMAIL: ${GLITCHTIP_DEFAULT_FROM_EMAIL:-noreply@zerotrust.local}
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      REDIS_URL: redis://glitchtip-redis:6379/0
    volumes:
      - glitchtip_uploads:/code/uploads
    depends_on:
      glitchtip-migrate:
        condition: service_completed_successfully
      glitchtip-postgres:
        condition: service_healthy
      glitchtip-redis:
        condition: service_healthy
    networks:
      - zerotrust
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # HashiCorp Vault: secrets management (local dev mode — in-memory, auto-unsealed)
  # NEVER use dev mode in production. See docs/infra/README.md § HashiCorp Vault.
  # ─────────────────────────────────────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.17
    container_name: zerotrust-vault
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN:-dev-root-token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://127.0.0.1:8200
    command: server -dev
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - zerotrust
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # NocoDB: spreadsheet UI for SQL databases (operator-only — not wired into app)
  # Metadata lives in nocodb-postgres; connect to zerotrust Postgres separately
  # via the UI using scripts/ops/setup-nocodb-readonly-role.sql (read-only user).
  # NEVER point NocoDB at the app superuser or migrator credentials.
  # ─────────────────────────────────────────────────────────────────────────
  nocodb-postgres:
    image: postgres:16-alpine
    container_name: zerotrust-nocodb-postgres
    environment:
      POSTGRES_USER: nocodb
      POSTGRES_PASSWORD: ${NOCODB_POSTGRES_PASSWORD:-nocodb}
      POSTGRES_DB: nocodb
    volumes:
      - nocodb_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nocodb -d nocodb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zerotrust
    restart: unless-stopped

  nocodb:
    image: nocodb/nocodb:2026.06.2
    container_name: zerotrust-nocodb
    ports:
      - "8080:8080"
    environment:
      NC_DB: pg://nocodb-postgres:5432?u=nocodb&p=${NOCODB_POSTGRES_PASSWORD:-nocodb}&d=nocodb
      NC_AUTH_JWT_SECRET: ${NOCODB_JWT_SECRET:-change-me-generate-with-openssl-rand-hex-32}
      NC_PUBLIC_URL: ${NOCODB_PUBLIC_URL:-http://localhost:8080}
      NC_DISABLE_TELE: ${NOCODB_DISABLE_TELE:-true}
      NC_INVITE_ONLY_SIGNUP: ${NOCODB_INVITE_ONLY_SIGNUP:-false}
      # When linking the zerotrust app DB, set NC_DISABLE_PG_DATA_REFLECTION=true
      # in prod overlay so NocoDB does not create reflection schemas in app Postgres.
      NC_DISABLE_PG_DATA_REFLECTION: ${NOCODB_DISABLE_PG_DATA_REFLECTION:-false}
    volumes:
      - nocodb_data:/usr/app/data
    depends_on:
      nocodb-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - zerotrust
    restart: unless-stopped

networks:
  zerotrust:
    driver: bridge

volumes:
  opensearch_data:
    driver: local
  uptime_kuma_data:
    driver: local
  glitchtip_postgres_data:
    driver: local
  glitchtip_redis_data:
    driver: local
  glitchtip_uploads:
    driver: local
  nocodb_postgres_data:
    driver: local
  nocodb_data:
    driver: local
