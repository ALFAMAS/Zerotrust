name: PR preview stack

# CI-only compose smoke per PR (Tier 1 #4). Validates the Docker stack builds,
# migrates, and passes health checks. Posts a sticky PR comment with status.
# Optional cloud deploy: set PREVIEW_SSH_* secrets (see docs/deployment.md).

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Build and smoke-test preview stack
    runs-on: ubuntu-latest
    env:
      COMPOSE_PROJECT_NAME: pr-${{ github.event.pull_request.number }}
      DATABASE_URL: postgresql://zerotrust:password@localhost:5432/zerotrust_preview
      REDIS_URI: redis://:redispass@localhost:6379
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version

      - name: Validate compose file
        run: docker compose -f docker-compose.preview.yml config --quiet

      - name: Build preview images
        run: docker compose -f docker-compose.preview.yml build zerotrust zerotrust-ui

      - name: Start data plane
        run: docker compose -f docker-compose.preview.yml up -d postgres redis

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.preview.yml exec -T postgres pg_isready -U zerotrust -d zerotrust_preview; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.preview.yml logs postgres
          exit 1

      - name: Apply database migrations
        run: |
          bun install --frozen-lockfile
          bun run db:migrate

      - name: Start API and UI
        run: docker compose -f docker-compose.preview.yml up -d zerotrust zerotrust-ui

      - name: Smoke test API /health
        run: |
          for i in $(seq 1 45); do
            if curl -sf http://localhost:3000/health; then
              echo "API healthy"
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.preview.yml logs zerotrust
          exit 1

      - name: Smoke test UI
        run: |
          for i in $(seq 1 45); do
            if curl -sf http://localhost:3001/ > /dev/null; then
              echo "UI healthy"
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.preview.yml logs zerotrust-ui
          exit 1

      - name: Post preview status comment
        if: always()
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          header: pr-preview
          message: |
            ## PR preview stack

            | Check | Status |
            | --- | --- |
            | Compose config | `${{ job.status == 'success' && '✅' || '❌' }}` |
            | Docker build (API + UI) | `${{ job.status == 'success' && '✅' || '❌' }}` |
            | `db:migrate` | `${{ job.status == 'success' && '✅' || '❌' }}` |
            | API `GET /health` | `${{ job.status == 'success' && '✅' || '❌' }}` |
            | UI HTTP 200 | `${{ job.status == 'success' && '✅' || '❌' }}` |

            **CI-validated stack** (no public URL on GitHub-hosted runners). Reproduce locally:

            ```bash
            docker compose -f docker-compose.preview.yml -p pr-${{ github.event.pull_request.number }} up -d --build
            bun run db:migrate   # DATABASE_URL=postgresql://zerotrust:password@localhost:5432/zerotrust_preview
            ```

            | Service | Local URL |
            | --- | --- |
            | API | http://localhost:3000 |
            | UI | http://localhost:3001 |

            Commit: `${{ github.sha }}`

            Optional cloud preview: configure `PREVIEW_SSH_*` secrets per [`docs/deployment.md`](docs/deployment.md) § PR preview environments.

      - name: Tear down preview stack
        if: always()
        run: docker compose -f docker-compose.preview.yml down -v --remove-orphans

  cloud-preview:
    name: Optional cloud preview deploy
    runs-on: ubuntu-latest
    needs: preview
    if: |
      needs.preview.result == 'success' &&
      secrets.PREVIEW_SSH_HOST != '' &&
      secrets.PREVIEW_SSH_USER != '' &&
      secrets.PREVIEW_SSH_KEY != '' &&
      secrets.PREVIEW_APP_DIR != ''
    environment: preview
    steps:
      - name: Deploy PR ref over SSH
        env:
          SSH_HOST: ${{ secrets.PREVIEW_SSH_HOST }}
          SSH_USER: ${{ secrets.PREVIEW_SSH_USER }}
          SSH_KEY: ${{ secrets.PREVIEW_SSH_KEY }}
          APP_DIR: ${{ secrets.PREVIEW_APP_DIR }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_preview
          chmod 600 ~/.ssh/id_preview
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_preview "$SSH_USER@$SSH_HOST" bash -se <<EOF
          set -euo pipefail
          cd "$APP_DIR"
          git fetch origin pull/$PR_NUMBER/head:pr-$PR_NUMBER
          git checkout pr-$PR_NUMBER
          bun install --frozen-lockfile
          docker compose -f docker-compose.preview.yml -p pr-$PR_NUMBER up -d --build
          DATABASE_URL=postgresql://zerotrust:password@localhost:5432/zerotrust_preview bun run db:migrate
          EOF

      - name: Update preview comment with cloud URL
        uses: marocchino/sticky-pull-request-comment@5770ad5eb8f42dd2c4f34da00c94c5381e49af88 # v3.0.5
        with:
          header: pr-preview
          message: |
            ## PR preview stack

            Cloud preview deployed for PR #${{ github.event.pull_request.number }} (`${{ github.sha }}`).

            Configure `PREVIEW_PUBLIC_UI_URL` / `PREVIEW_PUBLIC_API_URL` repository variables
            to show live links here (see `docs/deployment.md` § PR preview environments).
