name: Disaster Recovery Drill

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

jobs:
  backup-restore:
    name: Backup and Restore Drill
    runs-on: ubuntu-latest
    services:
      source-postgres:
        image: postgres:16
        env:
          POSTGRES_USER: zerotrust
          POSTGRES_PASSWORD: password
          POSTGRES_DB: zerotrust_source
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      restore-postgres:
        image: postgres:16
        env:
          POSTGRES_USER: zerotrust
          POSTGRES_PASSWORD: password
          POSTGRES_DB: zerotrust_restore
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SOURCE_DATABASE_URL: postgresql://zerotrust:password@localhost:5432/zerotrust_source
      RESTORE_DATABASE_URL: postgresql://zerotrust:password@localhost:5433/zerotrust_restore
      TOKEN_SECRET_HEX: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
      CSFLE_MASTER_KEY_HEX: f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3b2a1f6e5
      BACKUP_DIR: ./backups/dr-drill
      BACKUP_REQUIRE_ENCRYPTION: "true"
      BACKUP_ENCRYPTION_KEY_HEX: 000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install PostgreSQL client tools
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Prepare source schema
        run: bun run db:push
        env:
          DATABASE_URL: ${{ env.SOURCE_DATABASE_URL }}
      - name: Seed restore-drill evidence row
        run: |
          psql "$SOURCE_DATABASE_URL" -c "insert into users (email, display_name, status) values ('dr-drill@example.com', 'DR Drill', 'active') on conflict (email) do nothing;"
      - name: Create encrypted backup
        run: bun run db:backup
        env:
          DATABASE_URL: ${{ env.SOURCE_DATABASE_URL }}
      - name: Restore latest backup into isolated database
        run: |
          latest="$(ls -t "$BACKUP_DIR"/*.dump.enc | head -1)"
          echo "Restoring $latest"
          bun run db:restore -- "$latest" --clean
        env:
          DATABASE_URL: ${{ env.RESTORE_DATABASE_URL }}
      - name: Verify restored evidence row
        run: |
          psql "$RESTORE_DATABASE_URL" -tAc "select count(*) from users where email = 'dr-drill@example.com';" | grep -qx "1"
      - name: Upload backup evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dr-drill-backup-artifacts
          path: backups/dr-drill/
