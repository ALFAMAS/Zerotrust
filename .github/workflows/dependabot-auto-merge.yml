name: Dependabot auto-merge

# Enable GitHub auto-merge for Dependabot minor/patch PRs labeled `automerge`
# once branch protection checks pass. Majors labeled `needs-migration` are excluded.

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled]
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  automerge-on-pr:
    name: Enable auto-merge (PR event)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      contains(toJSON(github.event.pull_request.labels.*.name), 'automerge') &&
      !contains(toJSON(github.event.pull_request.labels.*.name), 'needs-migration')
    steps:
      - name: Enable pull request auto-merge
        uses: peter-evans/enable-pull-request-automerge@a660677d5469627102a1c1e11409dd063606628d # v3
        with:
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash

  automerge-after-ci:
    name: Enable auto-merge (post-CI)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Resolve pull request
        id: pr
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const run = context.payload.workflow_run;
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${run.head_repository.owner.login}:${run.head_branch}`,
              state: 'open',
            });
            const pr = pulls.data[0];
            if (!pr) {
              core.info('No open pull request for workflow_run head branch');
              return;
            }
            if (pr.user.login !== 'dependabot[bot]') {
              core.info('Skipping: PR author is not dependabot[bot]');
              return;
            }
            const labels = pr.labels.map((l) => l.name);
            if (!labels.includes('automerge') || labels.includes('needs-migration')) {
              core.info(`Skipping: labels=${labels.join(', ')}`);
              return;
            }
            core.setOutput('number', String(pr.number));

      - name: Enable pull request auto-merge
        if: steps.pr.outputs.number != ''
        uses: peter-evans/enable-pull-request-automerge@a660677d5469627102a1c1e11409dd063606628d # v3
        with:
          pull-request-number: ${{ steps.pr.outputs.number }}
          merge-method: squash
