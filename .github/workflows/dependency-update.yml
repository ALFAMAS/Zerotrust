name: Dependency update

# Scheduled dependency refresh. Bumps every dependency to its latest version,
# runs the full required gate (lint, type-check, tests, generated-output drift,
# UI build), and opens a single grouped PR so the bumps are reviewed together
# rather than as dozens of individual PRs. The same gates run again via ci.yml
# on the PR itself, so a bump that breaks the build cannot merge.

on:
  schedule:
    # Mondays 06:17 UTC (off the :00 mark to avoid the scheduler stampede).
    - cron: "17 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dependency-update
  cancel-in-progress: true

jobs:
  update:
    name: Bump dependencies and open grouped PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version

      - name: Snapshot package manifests (pre-bump)
        run: |
          cp package.json /tmp/package.root.before.json
          cp packages/ui/package.json /tmp/package.ui.before.json

      - name: Update dependencies to latest
        run: |
          bun update --latest
          bun install

      - name: Detect semver-major bumps
        id: majors
        run: |
          bun scripts/ci/detect-major-bumps.ts \
            /tmp/package.root.before.json package.json \
            /tmp/package.ui.before.json packages/ui/package.json

      - name: Lint & format
        run: bun run lint:ci
      - name: Type-check (API)
        run: bun run type-check
      - name: Tests
        run: bun run test --run
      - name: Generated-output drift
        run: bun run verify:generated
      - name: Build UI
        run: bun run --cwd packages/ui build

      - name: Open grouped dependency PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: "chore(deps): scheduled dependency update"
          branch: deps/scheduled-update
          delete-branch: true
          title: "chore(deps): scheduled dependency update"
          body: |
            Automated weekly dependency refresh (`bun update --latest`).

            All required gates ran green in this workflow before the PR was
            opened: lint, type-check, tests, generated-output drift, and the UI
            build. CI re-runs the same gates on this PR.

            ${{ steps.majors.outputs.has_majors == 'true' && '**Contains semver-major bumps** — manual migration review required (`needs-migration`).' || 'Minor/patch only — review lockfile then merge.' }}
          labels: |
            dependencies
            ${{ steps.majors.outputs.has_majors == 'true' && 'needs-migration' || '' }}
