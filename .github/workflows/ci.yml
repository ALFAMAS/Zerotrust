name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run type-check

  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Run tests with coverage
        run: npm run test:coverage -- --reporter=json --outputFile=coverage/coverage-summary.json || true
      - name: Upload coverage report
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  coverage-comment:
    name: Coverage PR Comment
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/
      - name: Post coverage summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summaryPath = 'coverage/coverage-summary.json';
            if (!fs.existsSync(summaryPath)) {
              console.log('No coverage summary found, skipping comment');
              return;
            }
            const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
            const total = summary.total || {};
            const lines = total.lines?.pct ?? 'N/A';
            const functions = total.functions?.pct ?? 'N/A';
            const branches = total.branches?.pct ?? 'N/A';
            const statements = total.statements?.pct ?? 'N/A';
            const body = [
              '## Coverage Report',
              '',
              '| Metric | Coverage |',
              '|--------|----------|',
              `| Lines | ${lines}% |`,
              `| Functions | ${functions}% |`,
              `| Branches | ${branches}% |`,
              `| Statements | ${statements}% |`,
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - run: npm ci
      - name: Run npm audit
        run: npm audit --audit-level=high || true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck, test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: zeroauth:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
