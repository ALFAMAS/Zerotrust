name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs for the same ref (e.g. rapid pushes to a PR) so the
# queue isn't clogged. `main` pushes key on the unique SHA so they never cancel
# each other.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - run: bun install --frozen-lockfile
      - name: Biome (lint + format check)
        run: bun run lint:ci
      - name: Production dependency audit
        # Use Bun's native audit against the real bun.lock. The previous
        # `npm install --package-lock-only` approach crashed ("Cannot read
        # properties of null") because npm cannot resolve this Bun workspace,
        # so the gate never actually ran.
        run: bun audit --prod --audit-level=high
      - run: bun run type-check

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: zerotrust
          POSTGRES_PASSWORD: password
          POSTGRES_DB: zerotrust_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://zerotrust:password@localhost:5432/zerotrust_test
      REDIS_URI: redis://localhost:6379
      TOKEN_SECRET_HEX: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
      CSFLE_MASTER_KEY_HEX: f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3b2a1f6e5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - run: bun install --frozen-lockfile
      - name: Apply database schema
        run: bun run db:push
      - run: bun run test --reporter=verbose
      # Coverage is tracked toward the 85% target but kept non-blocking: the
      # codebase is currently ~56%, so gating at 85% deadlocks every PR. Flip
      # back to a hard gate once coverage is ratcheted up to the threshold.
      - name: Coverage report (target 85%, non-blocking)
        run: bun run test:coverage -- --run
        continue-on-error: true
      - name: API/UI integration drift audit
        run: bun run audit:integration
      - name: Verify integration matrix is committed
        run: git diff --exit-code -- docs/api-ui-integration-matrix.md
      - name: SDK drift check
        run: bun run sdk:check
      - name: shadcn/ui adoption audit
        run: bun run ui:audit
      - name: Verify shadcn adoption report is committed
        run: git diff --exit-code -- docs/shadcn-adoption-report.md
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  security-scan:
    name: SAST & Dependency Scans
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - run: bun install --frozen-lockfile
      - name: Semgrep SAST
        uses: semgrep/semgrep-action@v1
        with:
          config: p/owasp-top-ten
      # Non-blocking for now: the trivy-action's setup step currently fails while
      # installing the Trivy binary (v0.64.1) on the runner — before any scan
      # runs — so it gates every PR without providing signal. Semgrep (above) and
      # `bun audit --prod` (lint job) remain the blocking security gates. Flip
      # back to blocking once a working trivy-action/binary combo is pinned.
      - name: Trivy filesystem scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"

  build-ui:
    name: Build UI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ui
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - run: bun install --frozen-lockfile
      - run: bun run build
        env:
          NEXT_PUBLIC_ZEROTRUST_URL: http://localhost:3000

  e2e-ui:
    name: Playwright E2E & Accessibility Smoke
    runs-on: ubuntu-latest
    needs: [test, build-ui]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: zerotrust
          POSTGRES_PASSWORD: password
          POSTGRES_DB: zerotrust_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://zerotrust:password@localhost:5432/zerotrust_test
      REDIS_URI: redis://localhost:6379
      TOKEN_SECRET_HEX: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
      CSFLE_MASTER_KEY_HEX: f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3b2a1f6e5
    defaults:
      run:
        working-directory: packages/ui
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - run: bun install --frozen-lockfile
      - name: Apply database schema
        run: bun run --cwd ../.. db:push
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
      - name: Run Playwright smoke suite
        run: bun run test:e2e
        env:
          NEXT_PUBLIC_ZEROTRUST_URL: http://localhost:1337
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/ui/playwright-report/

  load-test:
    name: Load & Chaos Tests
    runs-on: ubuntu-latest
    needs: [test]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: zerotrust
          POSTGRES_PASSWORD: password
          POSTGRES_DB: zerotrust_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://zerotrust:password@localhost:5432/zerotrust_test
      REDIS_URI: redis://localhost:6379
      TOKEN_SECRET_HEX: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
      CSFLE_MASTER_KEY_HEX: f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3b2a1f6e5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - run: bun install --frozen-lockfile
      - name: Apply database schema
        run: bun run db:push

      - name: Start API server
        run: |
          bun run dev:api &
          echo "Waiting for API server..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:1337/health > /dev/null 2>&1; then
              echo "API server is ready"
              break
            fi
            sleep 1
          done

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Seed test users
        run: |
          for i in $(seq 0 49); do
            curl -sf -X POST http://localhost:1337/auth/register \
              -H "Content-Type: application/json" \
              -d "{\"email\":\"loadtest${i}@example.com\",\"password\":\"Load@Test1234!\",\"displayName\":\"Load Test ${i}\"}" || true
          done

      - name: Run load test (full suite)
        run: |
          k6 run \
            --out json=tests/load/results-full.json \
            -e BASE_URL=http://localhost:1337 \
            tests/load/full-suite.k6.js
        continue-on-error: true

      - name: Run chaos / fault injection test
        run: |
          k6 run \
            --out json=tests/load/results-chaos.json \
            -e BASE_URL=http://localhost:1337 \
            tests/load/chaos-fault.k6.js
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-test-results
          path: tests/load/results-*.json
