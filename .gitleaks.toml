title = "zerotrust Gitleaks configuration"

[extend]
useDefault = true

[[rules]]
id = "database-connection-string"
description = "Database connection string containing embedded credentials"
regex = '''(?i)\b(?:postgres(?:ql)?|mysql|mariadb|mongodb(?:\+srv)?|redis|rediss):\/\/[^:\s\/@]+:([^@\s\/\x27\x22]+)@[^\s\x27\x22]+'''
secretGroup = 1
entropy = 3.5
keywords = [
  "postgres://",
  "postgresql://",
  "mysql://",
  "mariadb://",
  "mongodb://",
  "mongodb+srv://",
  "redis://",
  "rediss://",
]
tags = ["database", "credentials"]
