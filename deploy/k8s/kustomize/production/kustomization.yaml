apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: zerotrust

resources:
  - ../base

# Production overlay — install chart with values-helm.yaml in this directory.
configMapGenerator:
  - name: zerotrust-deploy-notes
    behavior: merge
    literals:
      - overlay=production
      - helmValues=deploy/k8s/kustomize/production/values-helm.yaml
