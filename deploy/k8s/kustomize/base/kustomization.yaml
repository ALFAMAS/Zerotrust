apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: zerotrust

resources:
  - namespace.yaml

# Helm values reference for this overlay — apply with:
#   helm upgrade --install zerotrust ../../helm/zerotrust -n zerotrust -f values-helm.yaml

configMapGenerator:
  - name: zerotrust-deploy-notes
    literals:
      - overlay=base
      - helmChart=deploy/k8s/helm/zerotrust
