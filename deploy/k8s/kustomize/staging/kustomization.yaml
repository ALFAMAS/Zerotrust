apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: zerotrust-staging

resources:
  - ../base

# Staging overlay — install chart with values-helm.yaml in this directory.
configMapGenerator:
  - name: zerotrust-deploy-notes
    behavior: merge
    literals:
      - overlay=staging
      - helmValues=deploy/k8s/kustomize/staging/values-helm.yaml
