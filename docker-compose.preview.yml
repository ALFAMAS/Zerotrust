# CI PR preview stack — slim compose without fixed container_name so
# `-p pr-<number>` isolates per-run networks/volumes on shared runners.
# Not for local dev; use root docker-compose.yml instead.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zerotrust
      POSTGRES_PASSWORD: password
      POSTGRES_DB: zerotrust_preview
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zerotrust -d zerotrust_preview"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - preview

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass redispass --maxmemory-policy noeviction
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispass", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - preview

  zerotrust:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://zerotrust:password@postgres:5432/zerotrust_preview
      REDIS_URI: redis://:redispass@redis:6379
      TOKEN_SECRET_HEX: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
      CSFLE_MASTER_KEY_HEX: f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3b2a1f6e5d4c3b2a1f6e5
      METRICS_AUTH_TOKEN: ci-preview-metrics-token
      CORS_ALLOWED_ORIGINS: http://localhost:3001
      BACKUP_ENABLED: "false"
      WORKER_MODE: "true"
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3000/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - preview

  zerotrust-ui:
    build:
      context: .
      dockerfile: packages/ui/Dockerfile
      args:
        NEXT_PUBLIC_ZEROTRUST_URL: http://localhost:3000
        NEXT_PUBLIC_APP_URL: http://localhost:3001
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      zerotrust:
        condition: service_healthy
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:3000/ || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - preview

networks:
  preview:
    driver: bridge
