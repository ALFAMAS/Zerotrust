# Prometheus + Alertmanager for local/staging operational validation.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d prometheus alertmanager
#   Prometheus:   http://localhost:9090
#   Alertmanager: http://localhost:9093

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: zerotrust-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - zerotrust
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: zerotrust-alertmanager
    ports:
      - "9093:9093"
    networks:
      - zerotrust
    restart: unless-stopped

volumes:
  prometheus_data:
    driver: local
