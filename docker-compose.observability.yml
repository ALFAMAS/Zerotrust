# Prometheus + Alertmanager + Grafana full observability stack for local/staging.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d
#   Prometheus:   http://localhost:9090
#   Alertmanager: http://localhost:9093
#   Grafana:      http://localhost:3003  (admin / $GRAFANA_ADMIN_PASSWORD)
#   Loki:         http://localhost:3100
#   Tempo:        http://localhost:3200  (OTLP HTTP on :4318)
#
# Ship container logs to Loki (Linux / Docker Desktop WSL2 backend with socket access):
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml --profile logs up -d promtail
#
# Production Grafana (require strong admin password — no default admin/admin):
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml \
#     -f docker-compose.observability.prod.example.yml up -d
#
# Point zerotrust traces at Tempo instead of Jaeger:
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318 bun dev
#
# Token-gated /metrics (production-like): copy monitoring/metrics-token.example to
# monitoring/metrics-token, set the same value as METRICS_AUTH_TOKEN on the API, and
# ensure monitoring/prometheus.yml authorization block is active (see deployment.md OPS-1).

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: zerotrust-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - zerotrust
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: zerotrust-alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --web.external-url=http://localhost:9093
    volumes:
      - ${ALERTMANAGER_CONFIG:-./monitoring/alertmanager.yml}:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    networks:
      - zerotrust
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    container_name: zerotrust-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3003:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - zerotrust
    restart: unless-stopped

  loki:
    image: grafana/loki:3.3.2
    container_name: zerotrust-loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - zerotrust
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.6.1
    container_name: zerotrust-tempo
    command: ["-config.file=/etc/tempo/tempo-config.yml"]
    volumes:
      - ./monitoring/tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro
      - tempo_data:/tmp/tempo
    ports:
      - "3200:3200"
      - "4318:4318"
      - "4317:4317"
    networks:
      - zerotrust
    restart: unless-stopped

  promtail:
    profiles:
      - logs
    image: grafana/promtail:3.3.2
    container_name: zerotrust-promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
    networks:
      - zerotrust
    restart: unless-stopped

networks:
  zerotrust:
    driver: bridge

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  tempo_data:
    driver: local
