# Optional self-hosted PostgreSQL performance tooling.
# Merge with docker-compose.yml and enable only the profile you need.
services:
  postgres:
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
      - -c
      - pg_stat_statements.max=10000
      - -c
      - track_activity_query_size=2048

  pgbouncer:
    profiles:
      - pooling
    image: edoburu/pgbouncer:v1.25.2-p0
    ports:
      - "127.0.0.1:6432:6432"
    environment:
      DB_USER: ${PGBOUNCER_DATABASE_USER:-zerotrust_app_user}
      DB_PASSWORD: ${PGBOUNCER_DATABASE_PASSWORD:-}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${PGBOUNCER_DATABASE_NAME:-zerotrust}
      AUTH_TYPE: scram-sha-256
      AUTH_FILE: /var/run/pgbouncer/userlist.txt
    volumes:
      - ./infra/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
    tmpfs:
      - /var/run/pgbouncer:rw,noexec,nosuid,size=64k,mode=0700,uid=70,gid=70
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "127.0.0.1", "-p", "6432"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zerotrust

  pghero:
    profiles:
      - database-insights
    image: ankane/pghero:v3.8.0
    ports:
      - "127.0.0.1:8082:8080"
    environment:
      DATABASE_URL: ${PGHERO_DATABASE_URL:-}
      PGHERO_USERNAME: ${PGHERO_USERNAME:-}
      PGHERO_PASSWORD: ${PGHERO_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - ruby
        - -rnet/http
        - -e
        - "exit(Net::HTTP.get_response(URI('http://127.0.0.1:8080/health')).is_a?(Net::HTTPSuccess) ? 0 : 1)"
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - zerotrust
